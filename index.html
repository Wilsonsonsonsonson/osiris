<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>歐西里斯的復活 — 伊西斯的召喚</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#D4A843;--gold-light:#F2D680;--gold-dark:#A07830;
  --papyrus:#F5E6C8;--lapis:#1B3A6B;--lapis-dark:#0F2340;
  --scarab:#1A5C3A;--nile:#2E8B8B;--sand:#C2A66B;--obsidian:#1A1A2E;
  --seth-red:#8B2500;--seth-dark:#4A0000;
  --anubis-purple:#4A2D6B;--thoth-teal:#1B6B5A;--osiris-green:#2E7D32;
  --font-display:'Cinzel Decorative',serif;--font-heading:'Cinzel',serif;--font-body:'Noto Sans TC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;font-family:var(--font-body);background:linear-gradient(180deg,#0F2340,#1A1A2E 40%,#0D1B30);color:var(--papyrus)}

#app{display:flex;flex-direction:column;height:100%;max-width:520px;margin:0 auto;background:linear-gradient(180deg,rgba(15,35,64,.95),rgba(26,26,46,.98))}
#puzzleScreen{display:none;position:fixed;inset:0;z-index:200;background:linear-gradient(180deg,#0F2340,#1A1A2E);overflow-y:auto}

.header{padding:10px 16px 6px;text-align:center;border-bottom:2px solid var(--gold-dark);background:linear-gradient(180deg,rgba(27,58,107,.6),transparent);flex-shrink:0}
.header::after{content:'𓂀 𓃭 𓅃 𓆣 𓇋 𓈖 𓉐 𓊝 𓋹 𓌂 𓂀 𓃭 𓅃 𓆣';display:block;font-size:9px;letter-spacing:4px;color:var(--gold-dark);opacity:.5;margin-top:3px;overflow:hidden;white-space:nowrap}
.header h1{font-family:var(--font-display);font-size:15px;color:var(--gold);text-shadow:0 0 20px rgba(212,168,67,.3);letter-spacing:2px}
.header .sub{font-size:10px;color:var(--sand);margin-top:1px;font-family:var(--font-heading);letter-spacing:1px}

/* Progress / Tier tracker */
.tier-track{padding:8px 12px;background:rgba(0,0,0,.3);border-bottom:1px solid rgba(212,168,67,.15);flex-shrink:0;font-size:10px}
.tier-row{display:flex;align-items:center;gap:6px;margin:3px 0;color:var(--sand)}
.tier-row .t-label{width:28px;font-family:var(--font-heading);color:var(--gold-dark);font-weight:700;flex-shrink:0}
.tier-row .t-bars{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.tier-row .t-seg{display:flex;align-items:center;gap:2px}
.tier-row .t-seg .t-icon{font-size:9px;opacity:.6}
.t-pip{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--gold-dark);background:rgba(0,0,0,.3);transition:all .4s}
.t-pip.on{border-color:var(--gold);background:rgba(212,168,67,.2);box-shadow:0 0 6px rgba(212,168,67,.3)}
.tier-row .t-status{font-size:9px;margin-left:auto;flex-shrink:0}
.t-status.done{color:#6BCB8B}
.t-status.pending{color:var(--gold-dark)}
.tier-row .t-name{font-size:10px;color:var(--papyrus);margin-left:2px}

.chat-area{flex:1;overflow-y:auto;padding:12px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:2px}

/* Messages */
.msg{display:flex;gap:8px;margin-bottom:12px;animation:msgIn .4s ease;align-items:flex-start}
@keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.msg.player{flex-direction:row-reverse}
.msg .av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;border:1.5px solid var(--gold-dark)}
.msg .bbl{max-width:80%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.65}
.msg .bbl .spk{font-size:9px;font-family:var(--font-heading);margin-bottom:2px;letter-spacing:1px}

/* Character themes */
.msg.isis .av{background:var(--lapis)} .msg.isis .bbl{background:linear-gradient(135deg,#1B3A6B,#0F2340);border-top-left-radius:4px;border:1px solid rgba(212,168,67,.12)} .msg.isis .spk{color:var(--gold)}
.msg.seth .av{background:var(--seth-red);border-color:var(--seth-red)} .msg.seth .bbl{background:linear-gradient(135deg,#8B2500,#4A0000);border-top-left-radius:4px;border:1px solid rgba(139,37,0,.4)} .msg.seth .spk{color:#FF6B4A}
.msg.anubis .av{background:var(--anubis-purple);border-color:#7B5EA7} .msg.anubis .bbl{background:linear-gradient(135deg,#4A2D6B,#2D1B40);border-top-left-radius:4px;border:1px solid rgba(123,94,167,.3)} .msg.anubis .spk{color:#B39DDB}
.msg.thoth .av{background:var(--thoth-teal);border-color:#4DB6AC} .msg.thoth .bbl{background:linear-gradient(135deg,#1B6B5A,#0D3D32);border-top-left-radius:4px;border:1px solid rgba(77,182,172,.3)} .msg.thoth .spk{color:#80CBC4}
.msg.osiris .av{background:var(--osiris-green);border-color:#66BB6A} .msg.osiris .bbl{background:linear-gradient(135deg,#2E7D32,#1B5E20);border-top-left-radius:4px;border:1px solid rgba(102,187,106,.3)} .msg.osiris .spk{color:#A5D6A7}
.msg.player .av{background:var(--scarab)} .msg.player .bbl{background:linear-gradient(135deg,#2E5D3A,#1A3D28);border-top-right-radius:4px;border:1px solid rgba(46,139,139,.15)} .msg.player .spk{color:var(--nile)}

/* Buttons */
.qr{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;justify-content:center;animation:msgIn .4s ease}
.qb{background:linear-gradient(135deg,rgba(212,168,67,.12),rgba(212,168,67,.05));border:1px solid var(--gold-dark);color:var(--gold-light);padding:8px 14px;border-radius:20px;font-size:12px;font-family:var(--font-body);cursor:pointer;transition:all .3s;text-align:center;min-width:70px}
.qb:hover,.qb:active{background:linear-gradient(135deg,rgba(212,168,67,.3),rgba(212,168,67,.15));border-color:var(--gold);transform:translateY(-1px);box-shadow:0 4px 12px rgba(212,168,67,.2)}
.qb.st{min-width:100px;padding:10px 12px}
.qb.done{border-color:var(--scarab);color:#6BCB8B;background:rgba(26,92,58,.2);pointer-events:none}
.qb.done::after{content:' ✓'}

/* Input */
.inp{display:flex;gap:8px;padding:10px 14px;border-top:1px solid rgba(212,168,67,.15);background:rgba(0,0,0,.3);flex-shrink:0;align-items:center}
.inp input{flex:1;padding:10px 14px;border-radius:20px;border:1px solid var(--gold-dark);background:rgba(15,35,64,.6);color:var(--papyrus);font-size:14px;font-family:var(--font-body);outline:none;transition:border-color .3s}
.inp input::placeholder{color:rgba(194,166,107,.4)}
.inp input:focus{border-color:var(--gold)}
.inp button{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--gold-dark);background:rgba(212,168,67,.1);color:var(--gold);font-size:18px;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center}

.typing{display:flex;gap:4px;padding:4px 0}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--gold-dark);animation:td 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

/* Survey */
.sv-opt{background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.2);border-radius:12px;padding:8px 12px;margin:4px 0;cursor:pointer;font-size:13px;color:var(--papyrus);transition:all .2s;text-align:left;display:block;width:100%}
.sv-opt:hover{background:rgba(212,168,67,.2);border-color:var(--gold)}
.sv-stars{display:flex;gap:8px;justify-content:center;margin:8px 0}
.sv-stars span{font-size:28px;cursor:pointer;transition:transform .2s;opacity:.4}
.sv-stars span:hover,.sv-stars span.on{opacity:1;transform:scale(1.2)}

/* Staff PIN overlay */
.pin-overlay{position:fixed;inset:0;background:rgba(10,15,30,.95);display:flex;align-items:center;justify-content:center;z-index:150;animation:fadeIn .5s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.pin-card{text-align:center;padding:30px;max-width:340px}
.pin-card h3{font-family:var(--font-heading);color:var(--gold);font-size:16px;margin-bottom:12px}
.pin-card p{font-size:12px;color:var(--sand);margin-bottom:16px;line-height:1.5}
.pin-card input{width:180px;padding:12px;border-radius:12px;border:2px solid var(--gold-dark);background:rgba(15,35,64,.8);color:var(--gold);font-size:20px;text-align:center;letter-spacing:8px;font-family:var(--font-heading);outline:none}
.pin-card input:focus{border-color:var(--gold)}
.pin-card .pin-btns{display:flex;gap:10px;justify-content:center;margin-top:16px}
.pin-card .pin-btn{padding:8px 20px;border-radius:16px;border:1px solid var(--gold-dark);background:rgba(212,168,67,.1);color:var(--gold-light);cursor:pointer;font-size:13px;font-family:var(--font-body)}
.pin-card .pin-btn.confirm{border-color:var(--gold);background:rgba(212,168,67,.2)}
.pin-card .pin-err{color:#FF6B4A;font-size:11px;margin-top:8px}

/* Completion overlay */
.comp{position:fixed;inset:0;background:rgba(10,15,30,.97);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .8s}
.comp-card{text-align:center;padding:32px 24px;max-width:380px}
.comp-card .ankh{font-size:52px;margin-bottom:10px;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.comp-card h2{font-family:var(--font-display);color:var(--gold);font-size:18px;margin-bottom:8px}
.comp-card p{color:var(--papyrus);font-size:12px;line-height:1.7;margin-bottom:6px}
.comp-card .tier-res{display:inline-block;margin-top:12px;padding:10px 24px;border-radius:24px;border:2px solid var(--gold);font-family:var(--font-heading);color:var(--gold);font-size:14px;background:rgba(212,168,67,.1)}
.comp-card .cbtn{display:block;margin:14px auto 0;background:none;border:1px solid var(--gold-dark);color:var(--gold-light);padding:8px 20px;border-radius:16px;cursor:pointer;font-family:var(--font-body);font-size:12px}

/* Puzzle screen */
.pz-header{padding:16px;text-align:center;border-bottom:2px solid var(--gold-dark)}
.pz-header h2{font-family:var(--font-display);color:var(--gold);font-size:16px}
.pz-header .pz-back{position:absolute;left:16px;top:16px;background:none;border:1px solid var(--gold-dark);color:var(--gold-light);padding:6px 14px;border-radius:12px;cursor:pointer;font-size:11px}
.pz-content{padding:20px;max-width:480px;margin:0 auto}
.pz-card{background:rgba(27,58,107,.3);border:1px solid rgba(212,168,67,.15);border-radius:16px;padding:20px;margin:12px 0;text-align:center}
.pz-card h3{color:var(--gold);font-family:var(--font-heading);font-size:14px;margin-bottom:8px}
.pz-card p{font-size:12px;color:var(--sand);margin-bottom:12px;line-height:1.5}
.pz-btn{background:linear-gradient(135deg,rgba(212,168,67,.15),rgba(212,168,67,.08));border:1px solid var(--gold-dark);color:var(--gold-light);padding:10px 20px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .3s;font-family:var(--font-body)}
.pz-btn:hover{border-color:var(--gold);background:rgba(212,168,67,.25)}
/* Memory game */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:320px;margin:12px auto}
.mem-card{aspect-ratio:1;border-radius:10px;border:1.5px solid var(--gold-dark);background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all .3s;user-select:none}
.mem-card.flipped,.mem-card.matched{background:rgba(212,168,67,.15);border-color:var(--gold)}
.mem-card.matched{opacity:.6;pointer-events:none}
/* Cipher */
.cipher-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0}
.cipher-slot{width:36px;height:44px;border:1.5px solid var(--gold-dark);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:16px;background:rgba(0,0,0,.3)}
.cipher-slot .c-hiero{font-size:14px;color:var(--gold)}
.cipher-slot input{width:28px;border:none;background:transparent;color:var(--papyrus);font-size:16px;text-align:center;outline:none;font-family:var(--font-body)}
/* Quiz */
.quiz-opt{display:block;width:100%;text-align:left;padding:10px 14px;margin:6px 0;border-radius:12px;border:1px solid rgba(212,168,67,.2);background:rgba(0,0,0,.2);color:var(--papyrus);font-size:13px;cursor:pointer;transition:all .2s}
.quiz-opt:hover{border-color:var(--gold);background:rgba(212,168,67,.1)}
.quiz-opt.correct{border-color:#66BB6A;background:rgba(46,125,50,.2);color:#A5D6A7}
.quiz-opt.wrong{border-color:#FF6B4A;background:rgba(139,37,0,.2);color:#FF8A65}

/* QR Scanner overlay */
.qr-overlay{position:fixed;inset:0;z-index:250;background:rgba(10,15,30,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn .3s}
.qr-overlay h3{color:var(--gold);font-family:var(--font-heading);font-size:15px;margin-bottom:12px}
.qr-overlay p{color:var(--sand);font-size:11px;margin-bottom:16px;text-align:center;padding:0 20px;line-height:1.5}
.qr-video-wrap{width:280px;height:280px;border-radius:16px;overflow:hidden;border:2px solid var(--gold-dark);position:relative;background:#000}
.qr-video-wrap video{width:100%;height:100%;object-fit:cover}
.qr-video-wrap .scan-line{position:absolute;left:10%;right:10%;height:2px;background:var(--gold);top:0;animation:scanMove 2s ease-in-out infinite;box-shadow:0 0 12px var(--gold)}
@keyframes scanMove{0%,100%{top:10%}50%{top:90%}}
.qr-overlay .qr-close{margin-top:16px;background:none;border:1px solid var(--gold-dark);color:var(--gold-light);padding:10px 24px;border-radius:20px;cursor:pointer;font-size:13px;font-family:var(--font-body)}
.qr-overlay .qr-status{color:var(--gold);font-size:12px;margin-top:10px;min-height:20px}
.qr-scan-btn{background:linear-gradient(135deg,rgba(212,168,67,.2),rgba(212,168,67,.08));border:2px solid var(--gold);color:var(--gold-light);padding:12px 20px;border-radius:20px;font-size:13px;cursor:pointer;margin:10px auto;display:block;font-family:var(--font-body);transition:all .3s}
.qr-scan-btn:hover{background:rgba(212,168,67,.3);box-shadow:0 4px 16px rgba(212,168,67,.3)}

/* ── Audio toggle ── */
.audio-btn{position:absolute;right:12px;top:8px;width:30px;height:30px;border-radius:50%;border:1px solid var(--gold-dark);background:rgba(0,0,0,.3);color:var(--gold-dark);font-size:14px;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;z-index:5}
.audio-btn:hover{border-color:var(--gold);background:rgba(212,168,67,.15)}
.audio-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(212,168,67,.12)}

/* ── Fragment Collection Animation ── */
.frag-overlay{position:fixed;inset:0;z-index:180;pointer-events:none;overflow:hidden}
.frag-particle{position:absolute;border-radius:50%;pointer-events:none;will-change:transform,opacity}
.frag-glyph{position:absolute;left:50%;top:50%;font-size:48px;transform:translate(-50%,-50%) scale(0);opacity:0;filter:drop-shadow(0 0 20px rgba(212,168,67,.8));will-change:transform,opacity;z-index:2}
.frag-ring{position:absolute;left:50%;top:50%;width:0;height:0;border-radius:50%;border:2px solid var(--gold);transform:translate(-50%,-50%);opacity:0;z-index:1}
.frag-text{position:absolute;left:50%;bottom:28%;transform:translateX(-50%) translateY(20px);opacity:0;font-family:var(--font-heading);color:var(--gold-light);font-size:15px;letter-spacing:3px;text-shadow:0 0 24px rgba(212,168,67,.6),0 2px 8px rgba(0,0,0,.8);white-space:nowrap;z-index:3}
.frag-hieroline{position:absolute;left:0;right:0;text-align:center;font-size:10px;letter-spacing:6px;color:var(--gold-dark);opacity:0;z-index:1}

/* ── Osiris Resurrection Animation ── */
.rez-overlay{position:fixed;inset:0;z-index:190;background:rgba(5,10,20,.98);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column}
.rez-overlay *{pointer-events:none}
.rez-fragments{position:relative;width:260px;height:320px}
.rez-frag{position:absolute;font-size:22px;opacity:0;filter:drop-shadow(0 0 12px rgba(212,168,67,.5));will-change:transform,opacity}
.rez-silhouette{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:120px;height:200px;opacity:0}
.rez-silhouette-inner{width:100%;height:100%;background:linear-gradient(180deg,rgba(212,168,67,.05),rgba(212,168,67,.02));border-radius:50% 50% 45% 45% / 60% 60% 40% 40%;border:1px solid rgba(212,168,67,.08);position:relative;overflow:hidden}
.rez-heartbeat{position:absolute;left:50%;top:40%;width:8px;height:8px;border-radius:50%;background:var(--gold);transform:translate(-50%,-50%) scale(0);opacity:0;box-shadow:0 0 30px var(--gold),0 0 60px rgba(212,168,67,.4)}
.rez-flash{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(212,168,67,.6),rgba(242,214,128,.3) 40%,transparent 70%);opacity:0;z-index:2}
.rez-text{color:var(--gold-light);font-family:var(--font-display);font-size:20px;letter-spacing:4px;opacity:0;text-shadow:0 0 30px rgba(212,168,67,.5);margin-top:24px;text-align:center;z-index:3}
.rez-sub{color:var(--papyrus);font-family:var(--font-heading);font-size:12px;letter-spacing:2px;opacity:0;margin-top:8px;text-align:center;z-index:3}
.rez-ankh{font-size:64px;opacity:0;filter:drop-shadow(0 0 40px rgba(212,168,67,.7));z-index:3;margin-bottom:12px}
.rez-close{pointer-events:auto!important;margin-top:24px;padding:10px 28px;border-radius:20px;border:1px solid var(--gold-dark);background:rgba(212,168,67,.1);color:var(--gold-light);font-family:var(--font-body);font-size:13px;cursor:pointer;opacity:0;z-index:3;transition:all .3s}
.rez-close:hover{border-color:var(--gold);background:rgba(212,168,67,.25)}
.rez-eye{position:absolute;left:50%;top:28%;transform:translate(-50%,-50%);font-size:0;opacity:0;filter:drop-shadow(0 0 20px rgba(212,168,67,.8))}

@supports(padding-bottom:env(safe-area-inset-bottom)){.inp{padding-bottom:calc(10px + env(safe-area-inset-bottom))}}
</style>
</head>
<body>
<div id="app">
  <div class="header" style="position:relative">
    <h1>𓋹 OSIRIS 𓋹</h1>
    <div class="sub">歐西里斯的復活 — 伊西斯的召喚</div>
    <button class="audio-btn" id="audioBtn" onclick="SFX.toggle()" title="音效開關">🔇</button>
  </div>
  <div class="tier-track" id="tierTrack"></div>
  <div class="chat-area" id="chatArea"></div>
  <div class="inp" id="inputArea">
    <input type="text" id="userInput" placeholder="輸入答案⋯⋯" autocomplete="off">
    <button onclick="handleSend()">𓂧</button>
  </div>
</div>
<div id="puzzleScreen"></div>

<script>
/* ============================================================
   🔧 CONFIG — 設定區
   ============================================================ */
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwsbz7YCgMxPEWk2wZKRmDc5GO71USv_6p2GLhDCjDU9UfJJOZIgs6NDjKE7xgrxIC0/exec";
const STAFF_PIN = "2026"; // ← 工作人員驗證 PIN（可自訂）

// QR check-in: 在網址後加 ?checkin=ck1 即可自動觸發打卡
// 例如: https://yourdomain.com/osiris.html?checkin=ck1

/* ============================================================
   🎵 AUDIO ENGINE v2 — 強化版合成音效
   多層次、有空間感、角色特色鮮明
   ============================================================ */
const SFX=(()=>{
  let ctx=null,enabled=false,bgmNodes=null,masterGain=null,reverbGain=null,reverbDelay=null;
  const SCALE=[293.66,311.13,392,440,466.16,587.33,622.25,783.99];
  const SCALE_LO=[73.42,77.78,98,110,116.54,146.83,155.56,196];

  function init(){
    if(ctx)return;
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=ctx.createGain();masterGain.gain.value=0.55;masterGain.connect(ctx.destination);
    // Reverb bus: feedback delay network simulating temple space
    reverbGain=ctx.createGain();reverbGain.gain.value=0.25;
    const d1=ctx.createDelay(1);d1.delayTime.value=0.12;
    const d2=ctx.createDelay(1);d2.delayTime.value=0.19;
    const d3=ctx.createDelay(1);d3.delayTime.value=0.31;
    const fb1=ctx.createGain();fb1.gain.value=0.35;

    reverbGain.connect(d1);d1.connect(fb1);fb1.connect(d1);

  // Helper: send to both dry + reverb
  function dryWet(node,dry=1,wet=0.3){
    const dG=ctx.createGain();dG.gain.value=dry;node.connect(dG);dG.connect(masterGain);
    if(wet>0){const wG=ctx.createGain();wG.gain.value=wet;node.connect(wG);wG.connect(reverbGain)}
  }

  function toggle(){
    init();if(ctx.state==='suspended')ctx.resume();
    enabled=!enabled;
    const btn=document.getElementById('audioBtn');
    if(enabled){btn.textContent='🔊';btn.classList.add('on');startBGM()}
    else{btn.textContent='🔇';btn.classList.remove('on');stopBGM()}

  // ════════════════════════════════════════════
  // BGM: 4-layer Egyptian Ambient
  // ════════════════════════════════════════════
  function startBGM(){
    if(bgmNodes)return;
    const now=ctx.currentTime;
    // L1: Deep drone D2+A2 with subtle beating
    const droneG=ctx.createGain();droneG.gain.value=0.07;droneG.connect(masterGain);
    const d1=ctx.createOscillator();d1.type='sine';d1.frequency.value=73.42;d1.connect(droneG);d1.start();
    const d1b=ctx.createOscillator();d1b.type='sine';d1b.frequency.value=73.82;// slight detune for beating
    const d1bG=ctx.createGain();d1bG.gain.value=0.04;d1b.connect(d1bG);d1bG.connect(droneG);d1b.start();
    const d2=ctx.createOscillator();d2.type='sine';d2.frequency.value=110;
    const d2g=ctx.createGain();d2g.gain.value=0.035;d2.connect(d2g);d2g.connect(masterGain);d2.start();
    // Drone breath: slow volume modulation
    const breathLFO=ctx.createOscillator();breathLFO.type='sine';breathLFO.frequency.value=0.04;
    const breathG=ctx.createGain();breathG.gain.value=0.02;
    breathLFO.connect(breathG);breathG.connect(droneG.gain);breathLFO.start();

    // L2: Desert wind (filtered noise)
    const nLen=ctx.sampleRate*2,nBuf=ctx.createBuffer(1,nLen,ctx.sampleRate),nD=nBuf.getChannelData(0);
    for(let i=0;i<nLen;i++)nD[i]=Math.random()*2-1;
    const noise=ctx.createBufferSource();noise.buffer=nBuf;noise.loop=true;
    const nF=ctx.createBiquadFilter();nF.type='bandpass';nF.frequency.value=800;nF.Q.value=0.4;
    const nG=ctx.createGain();nG.gain.value=0.018;
    noise.connect(nF);nF.connect(nG);nG.connect(masterGain);noise.start();
    const lfo=ctx.createOscillator();lfo.type='sine';lfo.frequency.value=0.06;
    const lfoG=ctx.createGain();lfoG.gain.value=500;lfo.connect(lfoG);lfoG.connect(nF.frequency);lfo.start();
    // Second wind layer: higher, thinner
    const noise2=ctx.createBufferSource();noise2.buffer=nBuf;noise2.loop=true;
    const n2F=ctx.createBiquadFilter();n2F.type='bandpass';n2F.frequency.value=2200;n2F.Q.value=0.8;
    const n2G=ctx.createGain();n2G.gain.value=0.006;
    noise2.connect(n2F);n2F.connect(n2G);n2G.connect(masterGain);noise2.start();

    // L3: Pentatonic plucked oud notes with reverb
    let arpI=null;
    function pluck(){
      if(!enabled)return;
      const f=SCALE[Math.floor(Math.random()*SCALE.length)];
      // Main tone
      const o=ctx.createOscillator();o.type='triangle';o.frequency.value=f;
      // Overtone for richness
      const o2=ctx.createOscillator();o2.type='sine';o2.frequency.value=f*2.01;
      const e=ctx.createGain();e.gain.setValueAtTime(0.055,ctx.currentTime);
      e.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+3);
      const e2=ctx.createGain();e2.gain.setValueAtTime(0.02,ctx.currentTime);
      e2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+2);
      const fl=ctx.createBiquadFilter();fl.type='lowpass';
      fl.frequency.setValueAtTime(f*5,ctx.currentTime);fl.frequency.exponentialRampToValueAtTime(f*0.3,ctx.currentTime+2.5);
      const mix=ctx.createGain();mix.gain.value=1;
      o.connect(fl);o2.connect(fl);fl.connect(e);fl.connect(e2);
      e.connect(mix);e2.connect(mix);
      dryWet(mix,0.7,0.5);
      o.start();o.stop(ctx.currentTime+3.5);o2.start();o2.stop(ctx.currentTime+3);
      // Occasionally play two notes (interval)
      if(Math.random()>.65){
        const f2=SCALE[(SCALE.indexOf(f)+2)%SCALE.length];
        setTimeout(()=>{
          if(!enabled)return;
          const oo=ctx.createOscillator();oo.type='triangle';oo.frequency.value=f2;
          const ee=ctx.createGain();ee.gain.setValueAtTime(0.04,ctx.currentTime);
          ee.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+2.5);
          const ff=ctx.createBiquadFilter();ff.type='lowpass';ff.frequency.value=f2*3;
          oo.connect(ff);ff.connect(ee);dryWet(ee,0.6,0.5);
          oo.start();oo.stop(ctx.currentTime+3);
        },200+Math.random()*300);
      }
    }
    arpI=setInterval(()=>{pluck()},2200+Math.random()*2000);setTimeout(pluck,800);

    // L4: Soft rhythmic pulse (tabla-like)
    let rhythmI=null;
    function tablaHit(){
      if(!enabled)return;
      const types=[
        {f:100,type:'sine',dur:0.2,vol:0.04},// soft dum
        {f:250,type:'triangle',dur:0.08,vol:0.025},// light tak
        {f:180,type:'sine',dur:0.15,vol:0.03}// medium
      ];
      const t=types[Math.floor(Math.random()*types.length)];
      const o=ctx.createOscillator();o.type=t.type;o.frequency.setValueAtTime(t.f,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(t.f*0.3,ctx.currentTime+t.dur);
      const e=ctx.createGain();e.gain.setValueAtTime(t.vol,ctx.currentTime);
      e.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t.dur+0.1);
      const fl=ctx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=400;
      o.connect(fl);fl.connect(e);dryWet(e,0.8,0.2);
      o.start();o.stop(ctx.currentTime+t.dur+0.2);
    }
    // Rhythmic pattern: irregular but pulsing
    function rhythmLoop(){
      if(!enabled)return;
      tablaHit();
      if(Math.random()>.5)setTimeout(tablaHit,250);// double hit
      rhythmI=setTimeout(rhythmLoop,1800+Math.random()*2400);
    }
    setTimeout(rhythmLoop,3000);

    bgmNodes={d1,d1b,d2,noise,noise2,lfo,breathLFO,droneG,d1bG,d2g,nG,n2G,lfoG,breathG,arpI,rhythmI};
  }
  function stopBGM(){
    if(!bgmNodes)return;
    try{
      bgmNodes.d1.stop();bgmNodes.d1b.stop();bgmNodes.d2.stop();
      bgmNodes.noise.stop();bgmNodes.noise2.stop();bgmNodes.lfo.stop();bgmNodes.breathLFO.stop();
      clearInterval(bgmNodes.arpI);clearTimeout(bgmNodes.rhythmI);
    }catch(e){}
    bgmNodes=null;
  }

  // Isis: crystalline water drops cascade + shimmer
  function isisChime(){
    if(!enabled||!ctx)return;
    const notes=[783.99,622.25,783.99,1046.5,783.99];
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator();o.type='sine';o.frequency.value=f;
      const o2=ctx.createOscillator();o2.type='sine';o2.frequency.value=f*1.002;// chorus
      const o3=ctx.createOscillator();o3.type='sine';o3.frequency.value=f*2;// octave shimmer
      const e=ctx.createGain();const t=ctx.currentTime+i*.1;
      e.gain.setValueAtTime(0,t);
      e.gain.linearRampToValueAtTime(0.09,t+.015);
      e.gain.exponentialRampToValueAtTime(0.001,t+1.2);
      const e2=ctx.createGain();e2.gain.setValueAtTime(0,t);
      e2.gain.linearRampToValueAtTime(0.06,t+.015);
      e2.gain.exponentialRampToValueAtTime(0.001,t+1);
      const e3=ctx.createGain();e3.gain.setValueAtTime(0,t);
      e3.gain.linearRampToValueAtTime(0.025,t+.01);
      e3.gain.exponentialRampToValueAtTime(0.001,t+.6);
      const mix=ctx.createGain();mix.gain.value=1;
      o.connect(e);o2.connect(e2);o3.connect(e3);
      e.connect(mix);e2.connect(mix);e3.connect(mix);
      dryWet(mix,0.6,0.7);// lots of reverb for water feel
      o.start(t);o.stop(t+1.5);o2.start(t);o2.stop(t+1.3);o3.start(t);o3.stop(t+.8);
    });
    // Water splash noise
    const nb=ctx.createBuffer(1,ctx.sampleRate*.3|0,ctx.sampleRate),nd=nb.getChannelData(0);
    for(let i=0;i<nd.length;i++)nd[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*.05));
    const ns=ctx.createBufferSource();ns.buffer=nb;
    const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=4000;bp.Q.value=0.5;
    const ng=ctx.createGain();ng.gain.value=0.03;
    ns.connect(bp);bp.connect(ng);dryWet(ng,0.5,0.8);
    ns.start();
  }

      const o2=ctx.createOscillator();o2.type='sine';o2.frequency.value=f*1.002;
      const e=ctx.createGain();e.gain.setValueAtTime(0,now);

      e.gain.exponentialRampToValueAtTime(0.001,now+5);

    const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=5000;
    const ng=ctx.createGain();ng.gain.setValueAtTime(0.1,now);
    ng.gain.exponentialRampToValueAtTime(0.001,now+3);

  // Seth atmosphere: cold wind burst for checkSeth
  function sethAtmosphere(){
    if(!enabled||!ctx)return;
    const now=ctx.currentTime;
    const nb=ctx.createBuffer(1,ctx.sampleRate*3|0,ctx.sampleRate),nd=nb.getChannelData(0);
    for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;

    const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=600;bp.Q.value=0.3;
    bp.frequency.linearRampToValueAtTime(1200,now+1.5);bp.frequency.linearRampToValueAtTime(400,now+3);
    const e=ctx.createGain();e.gain.setValueAtTime(0,now);
    e.gain.linearRampToValueAtTime(0.04,now+.5);
    e.gain.linearRampToValueAtTime(0.03,now+2);
    e.gain.exponentialRampToValueAtTime(0.001,now+3);
    ns.connect(bp);bp.connect(e);dryWet(e,0.7,0.4);ns.start();ns.stop(now+3.5);

    const fl=ctx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=80;
    const oe=ctx.createGain();oe.gain.setValueAtTime(0,now);
    oe.gain.linearRampToValueAtTime(0.06,now+.8);
    oe.gain.exponentialRampToValueAtTime(0.001,now+3);
    o.connect(fl);fl.connect(oe);oe.connect(masterGain);o.start();o.stop(now+3.5);
  }

  // Navigation whoosh
  function whoosh(){
    if(!enabled||!ctx)return;
    const now=ctx.currentTime;
    const nb=ctx.createBuffer(1,ctx.sampleRate*.5|0,ctx.sampleRate),nd=nb.getChannelData(0);
    for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
    const ns=ctx.createBufferSource();ns.buffer=nb;
    const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.Q.value=1;
    bp.frequency.setValueAtTime(200,now);bp.frequency.exponentialRampToValueAtTime(3000,now+.15);
    bp.frequency.exponentialRampToValueAtTime(500,now+.4);
    const e=ctx.createGain();e.gain.setValueAtTime(0,now);
    e.gain.linearRampToValueAtTime(0.05,now+.08);
    e.gain.exponentialRampToValueAtTime(0.001,now+.4);
    ns.connect(bp);bp.connect(e);dryWet(e,0.7,0.4);ns.start();ns.stop(now+.5);
  }

  function charSound(role){
    if(!enabled||!ctx)return;
    ({isis:isisChime,seth:sethRumble,anubis:anubisBell,thoth:thothWhisper,osiris:osirisChord})[role]?.();
  }
  return{toggle,charSound,fragmentCollect,wrongAnswer,tap,heartbeat,resurrectionFlash,
    sethAtmosphere,whoosh,msgPing,typeTick,init,get enabled(){return enabled}};
})();

/* ============================================================
   🎬 FRAGMENT COLLECTION ANIMATION
   ============================================================ */
function playFragmentAnimation(fragName){
  return new Promise(resolve=>{
    SFX.fragmentCollect();
    const overlay=document.createElement('div');overlay.className='frag-overlay';
    document.body.appendChild(overlay);
    const hieros='𓂀𓃭𓅃𓆣𓇋𓈖𓉐𓊝𓋹𓌂𓏏𓐍';
    const cx=window.innerWidth/2,cy=window.innerHeight/2;
    for(let i=0;i<28;i++){
      const p=document.createElement('div');p.className='frag-particle';
      const angle=(i/28)*Math.PI*2+(Math.random()-.5)*.4;
      const dist=80+Math.random()*140,size=3+Math.random()*5;
      if(Math.random()>.65){
        p.textContent=hieros[Math.floor(Math.random()*hieros.length)];
        p.style.cssText=`left:${cx}px;top:${cy}px;font-size:${12+Math.random()*14}px;color:var(--gold);opacity:0;border-radius:0;background:none;filter:drop-shadow(0 0 6px rgba(212,168,67,.6))`;
      }else{
        const hue=35+Math.random()*20;
        p.style.cssText=`left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:hsl(${hue},${70+Math.random()*30}%,${55+Math.random()*25}%);box-shadow:0 0 ${4+Math.random()*8}px hsl(${hue},80%,60%);opacity:0`;
      }
      overlay.appendChild(p);
      const dx=Math.cos(angle)*dist,dy=Math.sin(angle)*dist;
      p.animate([
        {transform:'translate(-50%,-50%) scale(0)',opacity:0},
        {transform:`translate(calc(-50% + ${dx*.3}px),calc(-50% + ${dy*.3}px)) scale(1.5)`,opacity:1,offset:.15},
        {transform:`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px)) scale(.6)`,opacity:.8,offset:.55},
        {transform:`translate(calc(-50% + ${dx*1.1}px),calc(-50% + ${dy*1.1}px)) scale(0)`,opacity:0}
      ],{duration:900+Math.random()*400,delay:Math.random()*150,easing:'cubic-bezier(.22,.68,.36,1)',fill:'forwards'});
    }
    const ring=document.createElement('div');ring.className='frag-ring';overlay.appendChild(ring);
    ring.animate([{width:'0',height:'0',opacity:.9,borderWidth:'3px'},{width:'240px',height:'240px',opacity:.3,borderWidth:'1px'},{width:'400px',height:'400px',opacity:0,borderWidth:'.5px'}],{duration:800,delay:100,easing:'cubic-bezier(.22,.68,.36,1)',fill:'forwards'});
    const ring2=document.createElement('div');ring2.className='frag-ring';ring2.style.borderColor='var(--gold-light)';overlay.appendChild(ring2);
    ring2.animate([{width:'0',height:'0',opacity:.6,borderWidth:'2px'},{width:'300px',height:'300px',opacity:.15,borderWidth:'1px'},{width:'500px',height:'500px',opacity:0,borderWidth:'.5px'}],{duration:900,delay:250,easing:'cubic-bezier(.22,.68,.36,1)',fill:'forwards'});
    const glyph=document.createElement('div');glyph.className='frag-glyph';glyph.textContent='𓋹';overlay.appendChild(glyph);
    glyph.animate([
      {transform:'translate(-50%,-50%) scale(0) rotate(-180deg)',opacity:0},
      {transform:'translate(-50%,-50%) scale(1.3) rotate(0deg)',opacity:1,offset:.4},
      {transform:'translate(-50%,-50%) scale(1) rotate(0deg)',opacity:1,offset:.7},
      {transform:'translate(-50%,-50%) scale(1.1) rotate(0deg)',opacity:0}
    ],{duration:1600,delay:300,easing:'cubic-bezier(.22,.68,.36,1)',fill:'forwards'});
    const txt=document.createElement('div');txt.className='frag-text';txt.textContent=`⟐ ${fragName} ⟐`;overlay.appendChild(txt);
    txt.animate([
      {transform:'translateX(-50%) translateY(20px)',opacity:0},
      {transform:'translateX(-50%) translateY(0)',opacity:1,offset:.3},
      {transform:'translateX(-50%) translateY(0)',opacity:1,offset:.7},
      {transform:'translateX(-50%) translateY(-10px)',opacity:0}
    ],{duration:1400,delay:500,easing:'ease-out',fill:'forwards'});
    ['12%','88%'].forEach((pos,i)=>{
      const line=document.createElement('div');line.className='frag-hieroline';line.style.top=pos;
      line.textContent='𓂀 𓃭 𓅃 𓆣 𓇋 𓈖 𓉐 𓊝 𓋹 𓌂';overlay.appendChild(line);
      line.animate([{opacity:0},{opacity:.3,offset:.3},{opacity:.3,offset:.7},{opacity:0}],{duration:1600,delay:400+i*100,fill:'forwards'});
    });
    setTimeout(()=>{overlay.remove();resolve()},2200);
  });
}

/* ============================================================
   🎥 OSIRIS RESURRECTION ANIMATION (丙 ending)
   ============================================================ */
function playResurrectionAnimation(){
  return new Promise(resolve=>{
    const ov=document.createElement('div');ov.className='rez-overlay';ov.id='rezOverlay';
    document.body.appendChild(ov);
    const fb=document.createElement('div');fb.className='rez-fragments';ov.appendChild(fb);
    const sil=document.createElement('div');sil.className='rez-silhouette';
    sil.innerHTML='<div class="rez-silhouette-inner"></div>';fb.appendChild(sil);
    const heart=document.createElement('div');heart.className='rez-heartbeat';
    sil.querySelector('.rez-silhouette-inner').appendChild(heart);
    const eye=document.createElement('div');eye.className='rez-eye';eye.textContent='𓂀';
    sil.querySelector('.rez-silhouette-inner').appendChild(eye);
    const flash=document.createElement('div');flash.className='rez-flash';ov.appendChild(flash);
    const ankh=document.createElement('div');ankh.className='rez-ankh';ankh.textContent='𓋹';ov.appendChild(ankh);
    const ttl=document.createElement('div');ttl.className='rez-text';ttl.textContent='OSIRIS REBORN';ov.appendChild(ttl);
    const sub=document.createElement('div');sub.className='rez-sub';sub.textContent='歐西里斯的復活';ov.appendChild(sub);
    const cls=document.createElement('button');cls.className='rez-close';cls.textContent='返回';
    cls.onclick=()=>{ov.remove();resolve()};ov.appendChild(cls);

    const syms=['𓁵','𓂀','𓃭','𓅃','𓆣','𓇋','𓈖','𓉐','𓊝','𓋹','𓌂','𓏏','𓂧','𓐍','𓁢','𓁟'];
    const frags=[];
    syms.forEach((s,i)=>{
      const f=document.createElement('div');f.className='rez-frag';f.textContent=s;
      const a=(i/syms.length)*Math.PI*2;
      const rx=100+Math.random()*20,ry=130+Math.random()*20;
      const px=130+Math.cos(a)*rx,py=160+Math.sin(a)*ry;
      f.style.left=px+'px';f.style.top=py+'px';f.dataset.ox=px;f.dataset.oy=py;
      fb.appendChild(f);frags.push(f);
    });

    const T={appear:500,orbit:2000,sil:4500,hb:5500,eye:7000,flash:7800,title:8600,close:10000};

    frags.forEach((f,i)=>{f.animate([{opacity:0,transform:'scale(0) rotate(-90deg)'},{opacity:.8,transform:'scale(1) rotate(0deg)'}],{duration:400,delay:T.appear+i*80,fill:'forwards',easing:'cubic-bezier(.22,.68,.36,1)'})});
    frags.forEach((f,i)=>{
      const ox=+f.dataset.ox,oy=+f.dataset.oy,cX=130,cY=160;
      const dx=ox-cX,dy=oy-cY,dist=Math.sqrt(dx*dx+dy*dy),sa=Math.atan2(dy,dx);
      const kf=[];for(let k=0;k<=20;k++){const t=k/20,a=sa+t*Math.PI*.4,r=dist*(1-t*.6);
        kf.push({left:`${cX+Math.cos(a)*r}px`,top:`${cY+Math.sin(a)*r}px`,opacity:.8,filter:`drop-shadow(0 0 ${8+t*16}px rgba(212,168,67,${.3+t*.4}))`})}
      f.animate(kf,{duration:2500+Math.random()*500,delay:T.orbit+i*50,fill:'forwards',easing:'ease-in-out'});
    });

    sil.animate([{opacity:0,filter:'blur(20px)'},{opacity:.3,filter:'blur(12px)',offset:.3},{opacity:.6,filter:'blur(6px)',offset:.7},{opacity:.8,filter:'blur(2px)'}],{duration:2000,delay:T.sil,fill:'forwards',easing:'ease-out'});
    sil.querySelector('.rez-silhouette-inner').animate([
      {background:'linear-gradient(180deg,rgba(212,168,67,.05),rgba(212,168,67,.02))',borderColor:'rgba(212,168,67,.08)'},
      {background:'linear-gradient(180deg,rgba(212,168,67,.2),rgba(46,125,50,.15))',borderColor:'rgba(212,168,67,.3)'}
    ],{duration:2500,delay:T.sil+500,fill:'forwards'});

    function pulse(d){
      heart.animate([{transform:'translate(-50%,-50%) scale(0)',opacity:0},{transform:'translate(-50%,-50%) scale(1.8)',opacity:1,offset:.1},{transform:'translate(-50%,-50%) scale(1)',opacity:.7,offset:.3},{transform:'translate(-50%,-50%) scale(1.4)',opacity:.9,offset:.5},{transform:'translate(-50%,-50%) scale(1)',opacity:.6}],{duration:900,delay:d,fill:'forwards',easing:'ease-out'});
      const pr=document.createElement('div');pr.style.cssText='position:absolute;left:50%;top:40%;width:8px;height:8px;border-radius:50%;border:1px solid var(--gold);transform:translate(-50%,-50%);opacity:0';
      sil.querySelector('.rez-silhouette-inner').appendChild(pr);
      pr.animate([{width:'8px',height:'8px',opacity:.8},{width:'80px',height:'80px',opacity:0}],{duration:800,delay:d+50,fill:'forwards'});
    }
    pulse(T.hb);pulse(T.hb+700);pulse(T.hb+1100);
    setTimeout(()=>SFX.heartbeat(),T.hb);setTimeout(()=>SFX.heartbeat(),T.hb+700);setTimeout(()=>SFX.heartbeat(),T.hb+1100);

    eye.animate([{fontSize:'0px',opacity:0},{fontSize:'28px',opacity:1}],{duration:800,delay:T.eye,fill:'forwards',easing:'cubic-bezier(.22,.68,.36,1)'});

    flash.animate([{opacity:0},{opacity:1,offset:.15},{opacity:.8,offset:.4},{opacity:0}],{duration:1200,delay:T.flash,fill:'forwards',easing:'ease-out'});
    setTimeout(()=>SFX.resurrectionFlash(),T.flash);
    setTimeout(()=>{fb.animate([{opacity:1},{opacity:0}],{duration:600,fill:'forwards'})},T.flash+100);

    ankh.animate([{opacity:0,transform:'scale(0) rotate(-180deg)'},{opacity:1,transform:'scale(1) rotate(0deg)'}],{duration:1000,delay:T.title,fill:'forwards',easing:'cubic-bezier(.22,.68,.36,1)'});
    setTimeout(()=>{ankh.animate([{transform:'translateY(0)'},{transform:'translateY(-10px)'},{transform:'translateY(0)'}],{duration:3000,iterations:Infinity,easing:'ease-in-out'})},T.title+1000);
    ttl.animate([{opacity:0,transform:'translateY(20px)',letterSpacing:'12px'},{opacity:1,transform:'translateY(0)',letterSpacing:'4px'}],{duration:1200,delay:T.title+300,fill:'forwards',easing:'ease-out'});
    sub.animate([{opacity:0,transform:'translateY(10px)'},{opacity:.7,transform:'translateY(0)'}],{duration:800,delay:T.title+800,fill:'forwards',easing:'ease-out'});
    cls.animate([{opacity:0},{opacity:1}],{duration:600,delay:T.close,fill:'forwards'});
    setTimeout(()=>{if(document.getElementById('rezOverlay')){ov.remove();resolve()}},30000);
  });
}

// Local save (fast, but may be lost in LINE/IG webview)
function save(){
  try{localStorage.setItem('osiris_v3',JSON.stringify(S))}catch(e){}
  cloudSave(); // Also save to cloud

/* ============================================================
   GOOGLE SHEETS + CLOUD SAVE/LOAD
   ============================================================ */
function sheet(action,data){
  if(!SHEETS_URL)return;
  try{fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,player:S.name,uid:S.uid,ts:new Date().toISOString(),...data})})}catch(e){}
}

// Cloud save — sends current state to Google Sheet
let _saveTimer=null;
function cloudSave(){
  if(!SHEETS_URL||!S.name||!S.pin)return;
  // Debounce: only save once per 2 seconds
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    const saveData={completed:S.completed,sethDone:S.sethDone,redeemed:S.redeemed,puzzleUnlocked:S.puzzleUnlocked,uid:S.uid,surveyAns:S.surveyAns};
    fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'save',player:S.name,pin:S.pin,saveData})});
  },2000);
}

// Cloud load — reads state from Google Sheet (returns promise)
function cloudLoad(name,pin){
  if(!SHEETS_URL)return Promise.resolve(null);
  const url=`${SHEETS_URL}?action=load&name=${encodeURIComponent(name)}&pin=${encodeURIComponent(pin)}`;
  return fetch(url).then(r=>r.json()).then(d=>{
    if(d.status==='ok'&&d.data)return d.data;
    if(d.status==='not_found')return 'not_found';
    return null;
  }).catch(e=>{console.log('Cloud load error:',e);return null});
}

const $=id=>document.getElementById(id);

function scroll(){setTimeout(()=>{chat.scrollTop=chat.scrollHeight},60)}
function cnt(c){return STATIONS.filter(s=>s.cat===c&&S.completed[s.id]).length}
function total(){return Object.keys(S.completed).length}
function tier(){
  const l=cnt("lab"),e=cnt("exhibit"),c=cnt("checkin"),b=cnt("bonus");
  if(l>=TIERS.丙.lab&&e>=TIERS.丙.exhibit&&c>=TIERS.丙.checkin&&b>=TIERS.丙.bonus)return"丙";
  if(l>=TIERS.乙.lab&&e>=TIERS.乙.exhibit&&c>=TIERS.乙.checkin)return"乙";
  if(l>=TIERS.甲.lab&&e>=TIERS.甲.exhibit&&c>=TIERS.甲.checkin)return"甲";
  return null;
}

/* ============================================================
   TIER PROGRESS BAR
   ============================================================ */
function renderTiers(){
  const tk=$('tierTrack');
  const l=cnt("lab"),e=cnt("exhibit"),c=cnt("checkin"),b=cnt("bonus");
  function row(label,reqs,extra){
    const checks=[
      {icon:'🏛',have:l,need:reqs.lab},
      {icon:'📜',have:e,need:reqs.exhibit},
      {icon:'📍',have:c,need:reqs.checkin}
    ];
    if(reqs.bonus>0)checks.push({icon:'💀',have:b,need:reqs.bonus});
    const allMet=checks.every(x=>x.have>=x.need);
    let h=`<div class="tier-row"><span class="t-label">${label}</span><div class="t-bars">`;
    checks.forEach(x=>{
      h+=`<span class="t-seg"><span class="t-icon">${x.icon}</span>`;
      for(let i=0;i<x.need;i++) h+=`<span class="t-pip ${i<x.have?'on':''}"></span>`;
      h+=`</span>`;
    });
    h+=`</div><span class="t-status ${allMet?'done':'pending'}">${allMet?'✓ 達成':'未達成'}</span></div>`;
    return h;
  }
  let html=`<div style="font-size:9px;color:var(--gold-dark);font-family:var(--font-heading);margin-bottom:4px">𓋹 碎片 ${total()}/${STATIONS.length}${S.name?' | '+S.name:''}</div>`;
  html+=row('甲',TIERS.甲);
  html+=row('乙',TIERS.乙);
  html+=row('丙',TIERS.丙);
  tk.innerHTML=html;
}

/* ============================================================
   QR SCANNER — 遊戲內建 QR Code 掃描器
   ============================================================ */
const QR_CODES={'SIGNAL-CK1':'ck1','SIGNAL-CK2':'ck2','SIGNAL-CK3':'ck3','SIGNAL-CK4':'ck4'};
let qrStream=null,qrAnimFrame=null,jsQRLoaded=false;

function loadJsQR(){return new Promise((res,rej)=>{if(jsQRLoaded){res();return}const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';s.onload=()=>{jsQRLoaded=true;res()};s.onerror=()=>rej(new Error('load failed'));document.head.appendChild(s)})}

function openQRScanner(){
  const overlay=document.createElement('div');overlay.className='qr-overlay';overlay.id='qrOverlay';
  overlay.innerHTML=`<h3>📷 掃描打卡 QR Code</h3><p>將相機對準打卡點的 QR Code</p>
    <div class="qr-video-wrap"><video id="qrVideo" autoplay playsinline muted></video><canvas id="qrCanvas" style="display:none"></canvas><div class="scan-line"></div></div>
    <div class="qr-status" id="qrStatus">正在載入掃描器⋯⋯</div>
    <div style="margin-top:12px;text-align:center"><p style="color:var(--sand);font-size:11px;margin-bottom:8px">掃描有問題？手動輸入打卡密碼：</p>
    <div style="display:flex;gap:8px;justify-content:center;align-items:center"><input type="text" id="manualQRInput" placeholder="例如 SIGNAL-CK1" style="padding:8px 12px;border-radius:12px;border:1px solid var(--gold-dark);background:rgba(15,35,64,.6);color:var(--papyrus);font-size:13px;width:180px;outline:none;font-family:var(--font-body)">
    <button onclick="submitManualQR()" style="padding:8px 14px;border-radius:12px;border:1px solid var(--gold-dark);background:rgba(212,168,67,.15);color:var(--gold-light);cursor:pointer;font-size:12px">確認</button></div></div>
    <button class="qr-close" onclick="closeQRScanner()">取消</button>`;
  document.body.appendChild(overlay);
  setTimeout(()=>{const mi=$('manualQRInput');if(mi)mi.addEventListener('keydown',e=>{if(e.key==='Enter')submitManualQR()})},100);
  initScanner();
}

async function initScanner(){
  try{
    await loadJsQR();$('qrStatus').textContent='正在開啟相機⋯⋯';
    qrStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}}});
    const video=$('qrVideo');video.srcObject=qrStream;await video.play();
    $('qrStatus').textContent='掃描中⋯⋯對準 QR Code';
    const canvas=$('qrCanvas'),ctx=canvas.getContext('2d',{willReadFrequently:true});
    const scan=()=>{
      if(!qrStream)return;
      if(video.readyState===video.HAVE_ENOUGH_DATA){
        canvas.width=video.videoWidth;canvas.height=video.videoHeight;
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        const code=jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data,canvas.width,canvas.height,{inversionAttempts:'dontInvert'});
        if(code&&code.data){handleQRResult(code.data);return}
      }
      qrAnimFrame=requestAnimationFrame(scan);
    };scan();
  }catch(e){
    console.log('Scanner error:',e);
    const s=$('qrStatus');if(s)s.textContent=e.name==='NotAllowedError'?'相機權限被拒絕。請用下方手動輸入。':e.name==='NotFoundError'?'找不到相機。請用下方手動輸入。':'無法開啟掃描器。請用下方手動輸入。';
  }
}

function submitManualQR(){const mi=$('manualQRInput');if(mi&&mi.value.trim())handleQRResult(mi.value.trim())}

function handleQRResult(value){
  closeQRScanner();
  let ckId=QR_CODES[value.trim().toUpperCase()];
  if(!ckId){try{ckId=new URL(value).searchParams.get('checkin')}catch(e){}}
  if(ckId){
    const st=STATIONS.find(s=>s.id===ckId);
    if(st&&!S.completed[ckId]){msg('player','📷 掃描 QR Code');autoCheckin(ckId)}
    else if(st&&S.completed[ckId])say('isis','這個打卡點已完成了，祭司。',400).then(()=>hub());
    else say('isis','無法辨識此 QR Code。',400).then(()=>hub());
  }else say('isis','這不是有效的打卡密碼。請確認後重試。',400).then(()=>hub());
}

function closeQRScanner(){
  if(qrStream){qrStream.getTracks().forEach(t=>t.stop());qrStream=null}
  if(qrAnimFrame){cancelAnimationFrame(qrAnimFrame);qrAnimFrame=null}
  const o=$('qrOverlay');if(o)o.remove();
}

    const c=document.createElement('div');c.className='mem-card';c.dataset.idx=i;c.dataset.sym=sym;
    c.textContent='𓊝';
    c.onclick=()=>{
      if(lock||c.classList.contains('flipped')||c.classList.contains('matched'))return;
      c.classList.add('flipped');c.textContent=sym;flipped.push(c);
      if(flipped.length===2){
        lock=true;
        const[a,b]=flipped;
        if(a.dataset.sym===b.dataset.sym){
          a.classList.add('matched');b.classList.add('matched');
          matched++;flipped=[];lock=false;
          if(matched===pairs.length)$('memStatus').textContent='🎉 全部配對完成！託特對你的記憶力表示敬意。';
        }else{
          setTimeout(()=>{a.classList.remove('flipped');a.textContent='𓊝';b.classList.remove('flipped');b.textContent='𓊝';flipped=[];lock=false},800);
        }
      }
    };
    grid.appendChild(c);
  });
}

// ── Cipher Game ──
function startCipher(){
  const hieroglyphs={'𓅃':'I','𓃩':'S','𓁢':'A','𓁟':'T','𓋹':'N','𓆣':'K','𓂀':'H','𓊝':'R','𓇋':'E','𓈖':'L'};
  const words=[
    {hiero:['𓅃','𓃩','𓅃','𓃩'],answer:'ISIS'},
    {hiero:['𓁟','𓊝','𓇋','𓇋'],answer:'TREE'},
    {hiero:['𓈖','𓅃','𓆣','𓇋'],answer:'LIKE'},
    {hiero:['𓂀','𓇋','𓁢','𓊝','𓁟'],answer:'HEART'}
  ];
  const puzzle=words[Math.floor(Math.random()*words.length)];
  const pz=$('puzzleScreen');
  pz.querySelector('.pz-content').innerHTML=`
    <h3 style="text-align:center;color:var(--gold);font-family:var(--font-heading);margin:12px 0">象形文字密碼</h3>
    <p style="text-align:center;color:var(--sand);font-size:12px;margin-bottom:8px">密碼表：${Object.entries(hieroglyphs).map(([k,v])=>`${k}=${v}`).join('  ')}</p>
    <div class="cipher-grid" id="cipherGrid"></div>
    <p id="cipherStatus" style="text-align:center;color:var(--sand);font-size:12px;margin-top:12px">根據密碼表，填入對應的英文字母</p>
    <button class="pz-btn" style="display:block;margin:16px auto" onclick="checkCipher('${puzzle.answer}')">確認</button>
    <button class="pz-btn" style="display:block;margin:8px auto;opacity:.6" onclick="openPuzzles()">← 返回</button>`;
  const grid=$('cipherGrid');
  puzzle.hiero.forEach((h,i)=>{
    const slot=document.createElement('div');slot.className='cipher-slot';
    slot.innerHTML=`<span class="c-hiero">${h}</span><input maxlength="1" data-ci="${i}">`;
    grid.appendChild(slot);
  });
}
window.checkCipher=function(answer){
  const inputs=document.querySelectorAll('[data-ci]');
  const guess=[...inputs].map(i=>i.value.toUpperCase()).join('');
  if(guess===answer)$('cipherStatus').textContent='🎉 正確！你已掌握了象形文字密碼術。';
  else $('cipherStatus').textContent='✗ 不正確⋯⋯再看看密碼表。';
};

// ── Quiz Game ──
function startQuiz(){
  const questions=[
    {q:'在古埃及神話中，誰是冥界的審判者？',opts:['拉','阿努比斯','託特','荷魯斯'],ans:1},
    {q:'地球的哪一層是液態的？',opts:['地殼','地函','外地核','內地核'],ans:2},
    {q:'聖嬰現象主要影響哪個海洋？',opts:['大西洋','印度洋','太平洋','北冰洋'],ans:2},
    {q:'歐西里斯的妻子是誰？',opts:['哈索爾','芭絲特','伊西斯','瑪特'],ans:2},
    {q:'地震波中，哪種波無法穿透液體？',opts:['P波','S波','表面波','Love波'],ans:1},
    {q:'OBS 在海洋學中代表什麼？',opts:['Ocean Bottom Seismometer','Ocean Beacon System','Oceanic Base Station','Ocean Bottom Scanner'],ans:0},
    {q:'古埃及的「開口儀式」的目的是什麼？',opts:['讓死者開口說話與進食','打開金字塔的入口','開啟尼羅河的洪水閘門','開始農耕季節'],ans:0},
    {q:'板塊構造理論中，臺灣位於哪兩個板塊的交界？',opts:['太平洋板塊與歐亞板塊','菲律賓海板塊與歐亞板塊','印度板塊與歐亞板塊','太平洋板塊與菲律賓海板塊'],ans:1}
  ];
  let idx=0,score=0;
  const shuffled=questions.sort(()=>Math.random()-.5).slice(0,5);
  function showQ(){
    if(idx>=shuffled.length){
      const pz=$('puzzleScreen');
      pz.querySelector('.pz-content').innerHTML=`<div class="pz-card"><h3>測驗完成！</h3><p>得分：${score} / ${shuffled.length}</p><p style="margin-top:8px">${score===shuffled.length?'🎉 滿分！託特封你為「智慧之友」！':score>=3?'不錯！託特對你點了點頭。':'再多學習一些吧⋯⋯託特期待你的進步。'}</p><button class="pz-btn" style="margin-top:12px" onclick="openPuzzles()">← 返回試煉場</button></div>`;
      return;
    }
    const qd=shuffled[idx];
    const pz=$('puzzleScreen');
    pz.querySelector('.pz-content').innerHTML=`
      <h3 style="text-align:center;color:var(--gold);font-family:var(--font-heading);margin:12px 0">問題 ${idx+1}/${shuffled.length}</h3>
      <div class="pz-card"><p style="font-size:14px;color:var(--papyrus);margin-bottom:16px">${qd.q}</p>
      <div id="quizOpts">${qd.opts.map((o,i)=>`<button class="quiz-opt" data-qi="${i}">${o}</button>`).join('')}</div></div>
      <p style="text-align:center;color:var(--sand);font-size:11px">得分：${score}/${shuffled.length}</p>`;
    document.querySelectorAll('[data-qi]').forEach(b=>{
      b.onclick=()=>{
        const picked=parseInt(b.dataset.qi);
        document.querySelectorAll('[data-qi]').forEach(x=>{x.style.pointerEvents='none';x.classList.add(parseInt(x.dataset.qi)===qd.ans?'correct':'');if(parseInt(x.dataset.qi)===picked&&picked!==qd.ans)x.classList.add('wrong')});
        if(picked===qd.ans)score++;
        idx++;setTimeout(showQ,1000);
      };
    });
  }
  showQ();
}

/* ============================================================
   EVENT HANDLERS
   ============================================================ */
async function btnClick(b){
  switch(b.action){
    case 'accept':msg('player','我接受。');await say('isis','很好⋯⋯我在你身上看到了不該存在於凡人眼中的東西。',500);askName();break;
    case 'explain':msg('player','⋯⋯這是什麼？');await say('isis','「脈動｜SIGNALS」實境解謎。前往各站點解謎收集歐西里斯的碎片。\n\n🏛 實驗室7站 📜 系展4站 📍 打卡4處 💀 魔王關1關\n\n完成不同數量獲不同獎勵。',800);btns([{label:'我接受。',action:'accept'},{label:'🔄 恢復進度',action:'restore'}]);break;
    case 'restore':msg('player','我之前來過');startRestore();break;
    case 'cat':msg('player',{lab:'前往實驗室',exhibit:'前往系展',checkin:'前往打卡點',bonus:'挑戰魔王關'}[b.cat]);showCat(b.cat);break;
    case 'scan':msg('player','掃描打卡 QR Code');openQRScanner();break;
    case 'station':msg('player',`前往 ${STATIONS.find(s=>s.id===b.sid).name}`);startSt(b.sid);break;
    case 'hub':hub();break;
    case 'progress':msg('player','查看進度');showProgress();break;
    case 'redeem':msg('player','兌換獎勵');startSurvey();break;
    case 'puzzle':openPuzzles();break;
    case 'end':msg('player','結束旅程');await say('isis','願你在結界之外的世界，也能記住今天的選擇。\n\n𓋹 再見，祭司。𓋹',600);break;
  }
}

function handleSend(){
  const t=inp.value.trim();if(!t)return;inp.value='';msg('player',t);
  // ── New player: set name ──
  if(S.phase==='naming'){
    S.name=t;renderTiers();
    askPin();return;
  }
  // ── New player: set PIN ──
  if(S.phase==='setpin'){
    if(!/^\d{4}$/.test(t)){
      say('isis','祭司印記必須是 4 位數字。請重新輸入。',400);return;
    }
    S.pin=t;save();
    sheet('register',{name:S.name});
    say('isis',`${S.name}⋯⋯好。你的祭司印記已刻入結界。\n\n⚠️ 請記住你的名字和 4 位數密碼（${S.pin}），離開後可用它恢復進度。\n\n輸入「提示」獲得託特的指引。輸入「進度」查看碎片。\n\n出發。`,700).then(()=>{
      if(window._pendingCheckin&&!S.completed[window._pendingCheckin]){autoCheckin(window._pendingCheckin)}else{hub()}
    });return;
  }
  // ── Restore: enter name ──
  if(S.phase==='restore_name'){
    S.name=t;
    askRestorePin();return;
  }
  // ── Restore: enter PIN ──
  if(S.phase==='restore_pin'){
    S.pin=t;
    doRestore();return;
  }
  // ── Answering station question ──
  if(S.phase==='answering'&&S.cur){checkAns(t);return}
  // ── Survey free text ──
  if(S.phase==='survey'){
    const q=SURVEY[S.surveyStep];
    if(q&&(q.free||(!q.opts&&q.type!=='stars'))){
      S.surveyAns[q.id]=t;S.surveyStep++;save();
      if(S.surveyStep<SURVEY.length)askSQ();else finishSurvey();return;
    }
  }
  // ── General commands ──
  const lo=t.toLowerCase();
  if(['進度','progress'].includes(lo))showProgress();
  else if(['幫助','help'].includes(lo))say('isis','點選按鈕選擇站點 | 「進度」查看狀態 | 回答時「提示」獲助 | 「重置」清除進度',400).then(()=>hub());
  else if(lo==='重置'||lo==='reset'){localStorage.removeItem('osiris_v3');location.reload()}
  else say('isis','祭司，使用按鈕選擇目的地，或輸入「幫助」。',300);
}

inp.addEventListener('keydown',e=>{if(e.key==='Enter')handleSend()});

// ── Init ──
startGame();
